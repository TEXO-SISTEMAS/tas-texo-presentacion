<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Texo as a Service — Presentación</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      user-select: none;
    }

    /* Slide ocupa TODA la pantalla */
    .slide {
      position: fixed;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .slide img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }

    /* Nav superpuesto abajo al centro */
    .nav {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 40px;
      padding: 8px 20px;
      z-index: 100;
    }

    .nav button {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      line-height: 1;
    }

    .nav button:hover:not(:disabled) {
      background: rgba(255,255,255,0.25);
    }

    .nav button:disabled {
      opacity: 0.2;
      cursor: default;
    }

    .counter {
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      min-width: 50px;
      text-align: center;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

  <div class="slide active"><img src="slides/slide_1.png" alt="Slide 1" /></div>
  <div class="slide"><img src="slides/slide_2.png" alt="Slide 2" /></div>
  <div class="slide"><img src="slides/slide_3.png" alt="Slide 3" /></div>
  <div class="slide"><img src="slides/slide_4.png" alt="Slide 4" /></div>
  <div class="slide"><img src="slides/slide_5.png" alt="Slide 5" /></div>
  <div class="slide"><img src="slides/slide_6.png" alt="Slide 6" /></div>
  <div class="slide"><img src="slides/slide_7.png" alt="Slide 7" /></div>

  <nav class="nav">
    <button id="prev" disabled aria-label="Anterior">&#8592;</button>
    <span class="counter" id="counter">1 / 7</span>
    <button id="next" aria-label="Siguiente">&#8594;</button>
  </nav>

  <script>
    const slides = document.querySelectorAll('.slide');
    const total = slides.length;
    let current = 0;

    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const counter = document.getElementById('counter');

    function goTo(n) {
      slides[current].classList.remove('active');
      current = n;
      slides[current].classList.add('active');
      counter.textContent = `${current + 1} / ${total}`;
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === total - 1;
    }

    prevBtn.addEventListener('click', () => { if (current > 0) goTo(current - 1); });
    nextBtn.addEventListener('click', () => { if (current < total - 1) goTo(current + 1); });

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { if (current < total - 1) goTo(current + 1); }
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { if (current > 0) goTo(current - 1); }
    });
  </script>

</body>
</html>
